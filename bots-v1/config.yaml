# NOTA (ADR-021): los agentes NACEN SIN instalaciones. Cada estrategia compra y
# mejora instalaciones por TIPO (campo, mina, metalurgia, …) con su capital, y
# el nivel de la instalación es el presupuesto de concurrencia compartido por las
# recetas del tipo. El fan-out de recetas por tick lo acota `max_recipes_per_tick`.
bots:
  # Un solo rol productivo (ADR-022): las especialidades se distinguen por
  # `strategy`, que decide qué TIPOS de instalación compra el bot.
  - username: "aguador_1"
    password: "dev-password-123"
    role: "transformer"
    strategy: "aguador"
    tick_interval_seconds: 5
    persist_path: "./.session_agua_1.json"
    auto_register: true

  - username: "energetico_1"
    password: "dev-password-123"
    role: "transformer"
    strategy: "energetico"
    tick_interval_seconds: 5
    persist_path: "./.session_energ_1.json"
    auto_register: true

  - username: "miner_1"
    password: "dev-password-123"
    role: "transformer"
    strategy: "miner"
    tick_interval_seconds: 5
    persist_path: "./.session_miner_1.json"
    auto_register: true

  - username: "farmer_1"
    password: "dev-password-123"
    role: "transformer"
    strategy: "farmer"
    tick_interval_seconds: 5
    persist_path: "./.session_farmer_1.json"
