server:
  base_url: "http://192.168.1.201:9080/v1"
  ws_url: "ws://192.168.1.201:9080/v1/ws"

logging:
  level: "info"
  format: "text" # text or json

retry:
  max_attempts: 5
  initial_backoff_ms: 1000
  max_backoff_ms: 30000

# Factor de tiempo de simulacion del servidor (env SIM_TIME_FACTOR, default 5).
# El servidor cobra el salario como wage_rate_cents_per_sec * segundos_SIMULADOS,
# pero /catalog/recipes expone duration_seconds ya convertido a segundos REALES.
# Los bots multiplican por este factor para estimar el costo laboral correctamente.
sim_time_factor: 5

# Configuración de rotación de bots para simular actividad humana:
# - max_active: cantidad máxima de bots activos concurrentemente (0 para sin límite, ejecuta todos)
# - active_duration: cuánto tiempo juega cada bot antes de dormir y rotar (ej. "10m", "600s", "1h")
# - scale: cantidad de bots programáticos a generar (0 para usar la lista manual de bots)
max_active: 2500
active_duration: "4m"
scale: 100000

# Vista de mercado de los bots (MarketView). Todos opcionales; defaults en codigo.
market:
  # Peso del ultimo trade en la EMA del valor justo (0-1).
  ema_alpha: 0.25
  # Banda del fair value alrededor del precio base: evita fugas de precio por
  # retroalimentacion bot-a-bot. fair queda en [base*lo, base*hi].
  fair_band_lo: 0.4
  fair_band_hi: 2.5
  # Frescura del cache de top-of-book (segundos) antes de refetchear.
  top_ttl_seconds: 12
  # Llamadas REST de top-of-book permitidas por bot por tick. Con enjambres
  # grandes (-scale) este numero es lo que protege al servidor.
  rest_budget_per_tick: 4
  # Ventana (segundos) para considerar que un producto tiene mercado "vivo".
  recent_window_seconds: 600

# Precios base (cents/unidad) para evaluar trades y margenes.
