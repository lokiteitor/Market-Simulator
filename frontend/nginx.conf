# Servidor estático del frontend (SPA). Se monta como
# /etc/nginx/conf.d/default.conf dentro de nginx:alpine.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compresión para texto/JS/CSS/SVG/JSON.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml;

    # Assets con hash en el nombre de archivo: cache larga e inmutable.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # El index nunca se cachea para que los deploys se reflejen al instante.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback: cualquier ruta del router sirve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
