# Proveedor de dashboards por fichero: carga los JSON montados en
# /var/lib/grafana/dashboards (ver deploy/docker-compose.yml).
apiVersion: 1

providers:
  - name: mercado
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
