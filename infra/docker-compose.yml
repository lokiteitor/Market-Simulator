# =============================================================================
# Simulación de Mercado Agrícola — despliegue local con Docker Compose.
#
# Uso (desde infra/):
#   docker compose up -d --build          # levanta todo el stack
#   docker compose --profile seed run --rm seed   # siembra el catálogo (one-shot)
#
# Red interna: SOLO apisix (9080), frontend (8090 por defecto), prometheus (9090) y
# grafana (3000) publican puertos al host. core/worker/postgres/redis son
# internos.
# =============================================================================

name: mercado-agricola

services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: market
      POSTGRES_PASSWORD: market
      POSTGRES_DB: market
    volumes:
      # postgres:18 usa PGDATA=/var/lib/postgresql/18/docker; el volumen se
      # monta en /var/lib/postgresql (no en .../data como en <=17).
      - pgdata:/var/lib/postgresql
      # El DDL se aplica una sola vez al inicializar el cluster.
      - ../specs/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U market -d market"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped
    networks: [market]

  redis:
    image: redis:8-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped
    networks: [market]

  # Pool de conexiones entre las N réplicas del core/worker y Postgres, en modo
  # transaction (ADR-019). Los advisory locks del matching son transaction-scoped
  # y por tanto compatibles con transaction pooling. Acota las conexiones reales
  # a Postgres (DEFAULT_POOL_SIZE) aunque cada proceso abra su propio pool.
  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: market
      DB_PASSWORD: market
      DB_NAME: market
      POOL_MODE: transaction
      AUTH_TYPE: scram-sha-256
      LISTEN_PORT: "6432"
      # MAX_CLIENT_CONN ≥ DB_POOL_MAX × (nº réplicas core + worker); holgado.
      MAX_CLIENT_CONN: "1000"
      # Conexiones reales a Postgres por (db,user); ≤ max_connections de Postgres.
      DEFAULT_POOL_SIZE: "50"
    expose:
      - "6432"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks: [market]

  core:
    build: &app-build
      context: ..
      dockerfile: infra/Dockerfile
      target: runtime
    image: mercado-agricola-app:local
    command: ["bun", "src/server.ts"]
    env_file:
      - .env.docker
    # 8 réplicas del Core (matching multiproceso, ADR-019). La serialización por
    # producto es cluster-wide vía advisory locks de Postgres; las notificaciones
    # WS van por Redis pub/sub, así que NO hacen falta sticky sessions. Escalar
    # con `docker compose up -d --scale core=N` o cambiando replicas aquí.
    # Dimensionado de conexiones: 8 × DB_POOL_MAX(10) = 80 conexiones cliente a
    # PgBouncer (≪ MAX_CLIENT_CONN=1000), multiplexadas a DEFAULT_POOL_SIZE=50
    # conexiones reales de Postgres. Nota de sizing: 8 procesos core saturan una
    # máquina de ~8 cores (más worker/postgres/redis); ajustar según el host.
    deploy:
      replicas: 8
    expose:
      - "8000" # API HTTP/WS (interno; se accede vía Caddy)
      - "8001" # métricas Prometheus
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      # La imagen no incluye curl/wget; se usa el propio runtime de bun.
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://localhost:8000/healthz').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    restart: unless-stopped
    networks: [market]

  worker:
    build: *app-build
    image: mercado-agricola-app:local
    command: ["bun", "src/worker.ts"]
    env_file:
      - .env.docker
    expose:
      - "8002" # métricas Prometheus del worker
    # Réplica ÚNICA (BullMQ concurrency:1 por cola garantiza no-solape de sweeps,
    # incluido el fee-ledger-sweep). NO escalar sin revisar esa garantía.
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks: [market]

  seed:
    build: *app-build
    image: mercado-agricola-app:local
    command: ["bun", "src/seed.ts"]
    env_file:
      - .env.docker
    profiles: ["seed"]
    restart: "no"
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    networks: [market]

  # Bootstrap del agente admin (panel de monitoreo). One-shot idempotente.
  #   docker compose --profile seed run --rm seed-admin
  # Credenciales por ADMIN_USERNAME / ADMIN_PASSWORD en .env.docker.
  seed-admin:
    build: *app-build
    image: mercado-agricola-app:local
    command: ["bun", "src/seed-admin.ts"]
    env_file:
      - .env.docker
    profiles: ["seed"]
    restart: "no"
    depends_on:
      pgbouncer:
        condition: service_started
    networks: [market]

  caddy:
    image: caddy:2.8.4-alpine
    ports:
      - "9080:9080"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    # Con réplicas + upstreams dinámicos basta con que el core haya arrancado:
    # Caddy re-resuelve el DNS cada 5s y absorbe réplicas que tarden en estar
    # sanas (esperar a TODAS las réplicas healthy bloquearía el arranque).
    depends_on:
      core:
        condition: service_started
    restart: unless-stopped
    networks: [market]

  frontend:
    build:
      context: ../frontend
    # Puerto de host configurable (FRONTEND_PORT); default 8090 para no chocar
    # con el 8080, muy habitualmente ocupado por otros servicios locales.
    ports:
      - "${FRONTEND_PORT:-8090}:80"
    depends_on:
      - caddy
    restart: unless-stopped
    networks: [market]

  prometheus:
    image: prom/prometheus:v3.4.1
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks: [market]

  grafana:
    image: grafana/grafana:11.6.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    networks: [market]

networks:
  market:
    driver: bridge

volumes:
  pgdata:
