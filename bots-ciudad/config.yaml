server:
  base_url: "http://market-simulator:9080/v1"
  ws_url: "ws://market-simulator:9080/v1/ws"

logging:
  level: "info"
  format: "text" # text or json

retry:
  max_attempts: 5
  initial_backoff_ms: 1000
  max_backoff_ms: 30000

# Factor de tiempo de simulacion del servidor (env SIM_TIME_FACTOR, default 5).
# El servidor cobra el salario como wage_rate_cents_per_sec * segundos_SIMULADOS,
# pero /catalog/recipes expone duration_seconds ya convertido a segundos REALES.
# Los bots multiplican por este factor para estimar el costo laboral correctamente.
sim_time_factor: 5

# Si el servidor rechaza una accion con 422 insufficient_capital, el bot duerme
# este backoff (segundos reales), descarta el resto del lote y rebasea su
# estado con un snapshot fresco. Clave en modo swarm: un bot sin capital deja
# de martillar la API y cede el lugar al siguiente. 0 = default del SDK (60s).
insufficient_capital_backoff_seconds: 120

# --- Configuración específica de bots-ciudad ---
# Las ciudades son un conjunto FIJO de cuentas (capitales del mundo) sembradas
# por el backend. NO hay rotación ni scale: se corren TODAS a la vez y de forma
# permanente (modelan la demanda urbana). El binario es de instancia única
# (flock) porque los usernames son literales y dos procesos colisionarían en la
# sesión (refresh token de un solo uso).

# Lista canónica de ciudades (username + population_weight). MISMA fuente que
# usa el seed del backend, para no divergir. Ruta relativa al cwd del binario.
cities_path: "../infra/cities.json"

# Contraseña compartida con la que el backend siembra las credenciales de las
# ciudades (env CITY_SEED_PASSWORD del backend). DEBE coincidir.
city_password: "city-dev-password"

# Intervalo de tick de cada ciudad (segundos reales).
tick_interval_seconds: 5

# Jitter máximo de arranque (segundos) para no conectar las 50 a la vez.
startup_jitter_seconds: 20

# Vista de mercado de los bots (MarketView). Todos opcionales; defaults en codigo.
market:
  # Peso del ultimo trade en la EMA del valor justo (0-1).
  ema_alpha: 0.25
  # Banda del fair value alrededor del precio base: evita fugas de precio por
  # retroalimentacion bot-a-bot. fair queda en [base*lo, base*hi].
  fair_band_lo: 0.4
  fair_band_hi: 2.5
  # Frescura del cache de top-of-book (segundos) antes de refetchear.
  top_ttl_seconds: 12
  # Llamadas REST de top-of-book permitidas por bot por tick. Con enjambres
  # grandes (-scale) este numero es lo que protege al servidor.
  rest_budget_per_tick: 4
  # Ventana (segundos) para considerar que un producto tiene mercado "vivo".
  recent_window_seconds: 600

# Precios base (cents/unidad) para evaluar trades y margenes.
# NO EDITAR A MANO: bloque generado por propagacion de costo desde
# infra/seed-config.json (fuente unica del catalogo) con
#   cd backend && bun src/scripts/generate-bot-prices.ts
#   costo_unit = (wage_rate*duration_sim + sum(insumos)) * 100 / output_qty_cent
# El mismo bloque va en bots-v1/config.yaml y bots-ciudad/config.yaml: si
# divergen, los bots de mercado y las ciudades valoran distinto lo mismo.
